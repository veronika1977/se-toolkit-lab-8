services:
  nanobot:
    image: python:3.12-slim
    command: sh -c "pip install websockets -q && python /app/ws_server.py"
    volumes:
      - ./ws_server.py:/app/ws_server.py
    ports:
      - "8765:8765"
    networks:
      - lms-network

  client-web-flutter:
    image: nginx:alpine
    volumes:
      - ./client-web-flutter/web:/usr/share/nginx/html
    networks:
      - lms-network

  caddy:
    image: caddy:2.11-alpine
    ports:
      - "42002:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./client-web-flutter/web:/srv/flutter:ro
    depends_on:
      - nanobot
      - client-web-flutter
    networks:
      - lms-network

networks:
  lms-network:
    driver: bridge
