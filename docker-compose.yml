services:
  postgres:
    image: postgres:18.3-alpine
    environment:
      - POSTGRES_DB=test
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    networks:
      - lms-network

  backend:
    image: python:3.12-slim
    command: python /app/backend.py
    volumes:
      - ./backend.py:/app/backend.py
    ports:
      - "42001:8000"
    networks:
      - lms-network
    depends_on:
      - postgres

  nanobot:
    image: python:3.12-slim
    command: sh -c "pip install websockets -q && python /app/ws.py"
    volumes:
      - ./ws_server.py:/app/ws.py
    ports:
      - "8765:8765"
    networks:
      - lms-network

  caddy:
    image: caddy:2.11-alpine
    ports:
      - "42002:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - lms-network
    depends_on:
      - nanobot

networks:
  lms-network:
    driver: bridge
