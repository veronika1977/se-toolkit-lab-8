services:
  backend:
    build:
      context: ./backend
      additional_contexts:
        workspace: .
    restart: unless-stopped
    networks:
      - lms-network
    environment:
      - LMS_API_KEY=${LMS_API_KEY}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      - postgres

  postgres:
    image: postgres:18.3-alpine
    restart: unless-stopped
    networks:
      - lms-network
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

  qwen-code-api:
    build:
      context: ./qwen-code-api
    restart: unless-stopped
    networks:
      - lms-network
    ports:
      - "42005:8080"
    environment:
      - PORT=8080
      - ADDRESS=0.0.0.0
      - QWEN_CODE_API_KEY=${QWEN_CODE_API_KEY}
      - QWEN_CODE_AUTH_USE=false
      - DEFAULT_MODEL=coder-model
      - MAX_RETRIES=5
      - RETRY_DELAY_MS=1000
      - LOG_LEVEL=error
      - LOG_REQUESTS=true

  caddy:
    image: caddy:2.11-alpine
    restart: unless-stopped
    networks:
      - lms-network
    ports:
      - "42002:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - nanobot

  nanobot:
    build:
      context: ./nanobot
      additional_contexts:
        - workspace=.
    restart: unless-stopped
    networks:
      - lms-network
    environment:
      - LLM_API_KEY=${QWEN_CODE_API_KEY}
      - LLM_API_BASE_URL=http://qwen-code-api:8080/v1
      - LLM_API_MODEL=coder-model
      - NANOBOT_LMS_BACKEND_URL=http://backend:8000
      - NANOBOT_LMS_API_KEY=${LMS_API_KEY}
      - NANOBOT_ACCESS_KEY=${NANOBOT_ACCESS_KEY}
    ports:
      - "18790:18790"
      - "8765:8765"
    depends_on:
      - backend
      - qwen-code-api

networks:
  lms-network:
    driver: bridge
